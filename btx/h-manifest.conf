# HiveOS 自定义矿机清单 —— btx (nockchain GPU prover, btxpow)
# 原版 HiveOS 会先 source 本文件，再运行 h-config.sh / h-run.sh / h-stats.sh。
# minerX (os-fork) 不依赖本文件，但填上不影响其运行。
# 注意：CUSTOM_NAME 必须与矿机文件夹名一致（btx），否则 HiveOS 装包/启动会报错。

CUSTOM_NAME=btx
CUSTOM_VERSION=1.0
CUSTOM_BUILD=1

# 矿机配置文件全路径（本矿机走命令行参数，配置文件仅占位）
CUSTOM_CONFIG_FILENAME=/hive/miners/custom/btx/config.conf

# 日志 basename（不带 .log 后缀，HiveOS 规范）。
# h-run.sh 用 tee 落盘到 ${CUSTOM_LOG_BASENAME}.log，h-stats.sh 从这里读取。
CUSTOM_LOG_BASENAME=/var/log/miner/btx/btx
